# =============================================================================
# trading_enhancer — secret credentials (DO NOT COMMIT)
# =============================================================================
# This file is a TEMPLATE. Copy it to `config/secrets.local.yaml` and fill in
# your keys, or export them as environment variables — the data loader reads
# them via os.getenv(). Add `secrets.local.yaml` to .gitignore.

# Market data
POLYGON_API_KEY:        ""    # https://polygon.io
ALPACA_API_KEY:         ""    # https://app.alpaca.markets/paper/dashboard/overview
ALPACA_SECRET_KEY:      ""

# Options
TRADIER_API_KEY:        ""    # https://developer.tradier.com
UNUSUAL_WHALES_API_KEY: ""    # https://unusualwhales.com

# Sentiment / news
NEWSAPI_KEY:            ""    # https://newsapi.org   (28-day window on free tier)
FINNHUB_API_KEY:        ""    # https://finnhub.io    (60 req/min free)
ALPHA_VANTAGE_API_KEY:  ""    # https://www.alphavantage.co  (25 req/day free)
TWITTER_BEARER_TOKEN:   ""
REDDIT_CLIENT_ID:       ""
REDDIT_CLIENT_SECRET:   ""

# Macro
FRED_API_KEY:           ""    # https://fred.stlouisfed.org/docs/api/api_key.html

# Optional: per-vendor overrides
# NEWSAPI_MAX_LOOKBACK_DAYS: 28   # raise if you upgrade to a paid NewsAPI plan

# Models
FINBERT_MODEL_NAME:     "ProsusAI/finbert"
HF_TOKEN:               ""    # optional, for gated models

# Broker / execution
ALPACA_LIVE:            "false"   # set to "true" to use live endpoint
